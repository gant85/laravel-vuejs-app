trigger:
  branches:
    include:
      - main
      - develop
      - release/*
  paths:
    include:
      - apps/showcase/*
      - apps/showcase/**
      - libs/ui-kit/*
      - libs/ui-kit/**
      - docker/*
      - docker/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml

pr:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - apps/showcase/*
      - apps/showcase/**
      - libs/ui-kit/*
      - libs/ui-kit/**
      - docker/*
      - docker/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml

variables:
  - name: NODE_VERSION
    value: '24.x'
  - name: PHP_VERSION
    value: '8.2'
  - name: PNPM_VERSION
    value: '8.15.0'

stages:
  - stage: BuildShowcase
    displayName: 'Build and Test Showcase'
    jobs:
      - job: FrontendQuality
        displayName: 'Frontend Quality Checks'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: 'Cache pnpm store'
            inputs:
              key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
              path: $(PNPM_HOME)/store
              restoreKeys: |
                pnpm | "$(Agent.OS)"

          - script: |
              npm install -g pnpm@$(PNPM_VERSION)
            displayName: 'Install pnpm'

          - script: |
              pnpm install --frozen-lockfile
            displayName: 'Install Node Dependencies'

          - script: |
              pnpm --filter @reference-app-laravel-vue/showcase lint
            displayName: 'Lint Showcase'

          - script: |
              pnpm --filter @reference-app-laravel-vue/showcase type-check
            displayName: 'Type Check Showcase'

          - script: |
              pnpm sheriff
            displayName: 'Verify Architecture (Sheriff)'

      - job: FrontendTests
        displayName: 'Frontend Tests'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: 'Cache pnpm store'
            inputs:
              key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
              path: $(PNPM_HOME)/store
              restoreKeys: |
                pnpm | "$(Agent.OS)"

          - script: |
              npm install -g pnpm@$(PNPM_VERSION)
            displayName: 'Install pnpm'

          - script: |
              pnpm install --frozen-lockfile
            displayName: 'Install Node Dependencies'

          - script: |
              pnpm --filter @reference-app-laravel-vue/showcase test:coverage
            displayName: 'Run Showcase Tests with Coverage'

      - job: BackendQuality
        displayName: 'Backend Quality and Tests'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              sudo update-alternatives --set php /usr/bin/php$(PHP_VERSION)
              php -v
              composer --version
            displayName: 'Setup PHP $(PHP_VERSION)'

          - task: Cache@2
            displayName: 'Cache Composer dependencies'
            inputs:
              key: 'composer | "$(Agent.OS)" | apps/showcase/composer.lock'
              path: apps/showcase/vendor
              restoreKeys: |
                composer | "$(Agent.OS)"

          - script: |
              cd apps/showcase
              composer install --no-interaction --prefer-dist --optimize-autoloader
            displayName: 'Install Composer Dependencies'

          - script: |
              cd apps/showcase
              composer run lint
            displayName: 'Run Laravel Pint'

          - script: |
              cd apps/showcase
              composer run stan
            displayName: 'Run PHPStan'

          - script: |
              cd apps/showcase
              cp .env.example .env
              php artisan key:generate
            displayName: 'Setup Laravel Environment'

          - script: |
              cd apps/showcase
              php artisan test
            displayName: 'Run PHP Tests (Pest)'

      - job: SonarQubeAnalysis
        displayName: 'SonarQube Code Quality Analysis'
        dependsOn:
          - FrontendQuality
          - FrontendTests
          - BackendQuality
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(NODE_VERSION)

          - script: |
              npm install -g pnpm@$(PNPM_VERSION)
            displayName: 'Install pnpm'

          - script: |
              pnpm install --frozen-lockfile
            displayName: 'Install Node Dependencies'

          - script: |
              sudo update-alternatives --set php /usr/bin/php$(PHP_VERSION)
            displayName: 'Setup PHP $(PHP_VERSION)'

          - script: |
              cd apps/showcase
              composer install --no-interaction --prefer-dist --optimize-autoloader
            displayName: 'Install Composer Dependencies'

          - script: |
              pnpm --filter @reference-app-laravel-vue/showcase test:coverage
            displayName: 'Run Frontend Tests with Coverage'
            continueOnError: true

          - script: |
              cd apps/showcase
              cp .env.example .env
              php artisan key:generate
            displayName: 'Setup Laravel Environment'

          - script: |
              cd apps/showcase
              php artisan test --coverage-xml=coverage/coverage.xml --coverage-html=coverage/html
            displayName: 'Run Backend Tests with Coverage'
            continueOnError: true

          - task: SonarCloudPrepare@2
            displayName: 'Prepare SonarCloud Analysis'
            inputs:
              SonarCloud: '$(SONARCLOUD_SERVICE_CONNECTION)'
              organization: '$(SONAR_ORGANIZATION)'
              scannerMode: 'CLI'
              configMode: 'file'

          - task: SonarCloudAnalyze@2
            displayName: 'Run SonarCloud Analysis'

          - task: SonarCloudPublish@2
            displayName: 'Publish SonarCloud Quality Gate Result'
            inputs:
              pollingTimeoutSec: '300'

      - job: BuildApp
        displayName: 'Build Application'
        dependsOn:
          - FrontendQuality
          - FrontendTests
          - BackendQuality
          - SonarQubeAnalysis
        condition: succeededOrFailed()
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: 'Cache pnpm store'
            inputs:
              key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
              path: $(PNPM_HOME)/store
              restoreKeys: |
                pnpm | "$(Agent.OS)"

          - script: |
              npm install -g pnpm@$(PNPM_VERSION)
            displayName: 'Install pnpm'

          - script: |
              pnpm install --frozen-lockfile
            displayName: 'Install Node Dependencies'

          - script: |
              sudo update-alternatives --set php /usr/bin/php$(PHP_VERSION)
            displayName: 'Setup PHP $(PHP_VERSION)'

          - task: Cache@2
            displayName: 'Cache Composer dependencies'
            inputs:
              key: 'composer | "$(Agent.OS)" | apps/showcase/composer.lock'
              path: apps/showcase/vendor
              restoreKeys: |
                composer | "$(Agent.OS)"

          - script: |
              cd apps/showcase
              composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            displayName: 'Install Composer Dependencies (Production)'

          - script: |
              pnpm --filter @reference-app-laravel-vue/showcase build:prod
            displayName: 'Build Frontend Assets (Vite)'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Application Artifact'
            inputs:
              PathtoPublish: 'apps/showcase'
              ArtifactName: 'reference-app-laravel-vue-showcase'

  - stage: DeployDev
    displayName: 'Deploy to Development'
    dependsOn: BuildShowcase
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDev
        displayName: 'Deploy to Dev Environment'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'development'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: reference-app-laravel-vue-showcase

                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure Web App'
                  inputs:
                    azureSubscription: '$(AZURE_SUBSCRIPTION)'
                    appType: 'webAppLinux'
                    appName: '$(DEV_WEBAPP_NAME)'
                    package: '$(Pipeline.Workspace)/reference-app-laravel-vue-showcase'
                    runtimeStack: 'PHP|8.2'

                - task: AzureCLI@2
                  displayName: 'Run Database Migrations'
                  inputs:
                    azureSubscription: '$(AZURE_SUBSCRIPTION)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az webapp ssh --name $(DEV_WEBAPP_NAME) --resource-group $(RESOURCE_GROUP) --command "cd /home/site/wwwroot && php artisan migrate --force"

  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: BuildShowcase
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProd
        displayName: 'Deploy to Production Environment'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: reference-app-laravel-vue-showcase

                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure Web App'
                  inputs:
                    azureSubscription: '$(AZURE_SUBSCRIPTION)'
                    appType: 'webAppLinux'
                    appName: '$(PROD_WEBAPP_NAME)'
                    package: '$(Pipeline.Workspace)/reference-app-laravel-vue-showcase'
                    runtimeStack: 'PHP|8.2'
                    deploymentMethod: 'zipDeploy'

                - task: AzureCLI@2
                  displayName: 'Run Database Migrations'
                  inputs:
                    azureSubscription: '$(AZURE_SUBSCRIPTION)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az webapp ssh --name $(PROD_WEBAPP_NAME) --resource-group $(RESOURCE_GROUP) --command "cd /home/site/wwwroot && php artisan migrate --force"

                - task: AzureCLI@2
                  displayName: 'Optimize Laravel Cache'
                  inputs:
                    azureSubscription: '$(AZURE_SUBSCRIPTION)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az webapp ssh --name $(PROD_WEBAPP_NAME) --resource-group $(RESOURCE_GROUP) --command "cd /home/site/wwwroot && php artisan optimize:clear && php artisan config:cache && php artisan route:cache && php artisan view:cache"

  - stage: UpdateDocs
    displayName: 'Update Confluence Documentation'
    dependsOn: DeployProd
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: UploadConfluence
        displayName: 'Upload Documentation to Confluence'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: UsePythonVersion@0
            displayName: 'Use Python 3.11'
            inputs:
              versionSpec: '3.11'
              addToPath: true

          - script: |
              pip install requests
            displayName: 'Install Python Dependencies'

          - script: |
              cd scripts
              python upload_confluence.py
            displayName: 'Upload Documentation to Confluence'
            env:
              CONFLUENCE_USERNAME: $(CONFLUENCE_USERNAME)
              CONFLUENCE_API_TOKEN: $(CONFLUENCE_API_TOKEN)
              CONFLUENCE_BASE_URL: $(CONFLUENCE_BASE_URL)
