services:
  # PHP Application
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: reference-app-laravel-vue-php
    working_dir: /var/www/html
    volumes:
      - ./apps/showcase:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - vendor_data:/var/www/html/vendor
      - composer_cache:/root/.composer/cache
    networks:
      - reference-app-laravel-vue-network
    env_file:
      - ./apps/showcase/.env
    environment:
      # Xdebug configuration (override with .env)
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - XDEBUG_CLIENT_PORT=${XDEBUG_CLIENT_PORT:-9003}
      - XDEBUG_IDE_KEY=${XDEBUG_IDE_KEY:-VSCODE}
    extra_hosts:
      # Allow Xdebug to connect back to host machine
      - "host.docker.internal:host-gateway"

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: reference-app-laravel-vue-nginx
    ports:
      - "8000:80"
    volumes:
      - ./apps/showcase:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - reference-app-laravel-vue-network
    depends_on:
      - app

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  vendor_data:
    driver: local
  composer_cache:
    driver: local

networks:
  reference-app-laravel-vue-network:
    driver: bridge
