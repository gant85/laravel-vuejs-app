# SonarQube/SonarCloud Configuration
sonar.projectKey=reference-app-laravel-vue
sonar.projectName=Hospital Management System
sonar.projectVersion=1.0.0
sonar.organization=ahi-service

# Source directories
sonar.sources=apps/hospital/app,apps/hospital/resources/js,libs/ui-kit/src,apps/showcase/src,apps/showcase-ui-kit/src
sonar.tests=apps/hospital/tests,libs/ui-kit/tests,apps/hospital/resources/js/**/*.test.ts,apps/hospital/resources/js/**/*.spec.ts

# Exclusions
sonar.exclusions=**/node_modules/**,**/vendor/**,**/dist/**,**/build/**,**/storage/**,**/public/**,**/bootstrap/cache/**,**/*.test.ts,**/*.spec.ts,**/*.d.ts,**/*.config.ts,**/*.config.js

# Test exclusions
sonar.test.exclusions=**/*.test.ts,**/*.spec.ts

# Language-specific settings
sonar.php.coverage.reportPaths=apps/hospital/coverage/coverage.xml
sonar.php.tests.reportPath=apps/hospital/test-results/junit.xml

# JavaScript/TypeScript coverage
sonar.javascript.lcov.reportPaths=apps/hospital/coverage/lcov.info,libs/ui-kit/coverage/lcov.info

# TypeScript settings
sonar.typescript.tsconfigPath=apps/hospital/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Code duplication detection
sonar.cpd.exclusions=**/*.spec.ts,**/*.test.ts

# Quality Gates
# sonar.qualitygate.wait=true
# sonar.qualitygate.timeout=300

# Links
# sonar.links.homepage=https://github.com/your-org/reference-app-laravel-vue
# sonar.links.ci=https://dev.azure.com/your-org/reference-app-laravel-vue
# sonar.links.issue=https://github.com/your-org/reference-app-laravel-vue/issues
# sonar.links.scm=https://github.com/your-org/reference-app-laravel-vue
